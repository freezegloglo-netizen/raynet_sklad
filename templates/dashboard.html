{% extends "base.html" %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h1>Dashboard</h1>

<div class="stats">

<div class="stat-card">
<div class="stat-title">Produkty</div>
<div class="stat-value">{{ total_products }}</div>
</div>

<div class="stat-card">
<div class="stat-title">Nízký stav</div>
<div class="stat-value">{{ low_products }}</div>
</div>

<div class="stat-card">
<div class="stat-title">Pohyby dnes</div>
<div class="stat-value">{{ today_moves }}</div>
</div>

<div class="stat-card">
<div class="stat-title">Výrobci</div>
<div class="stat-value">{{ manufacturers }}</div>
</div>

</div>


<div class="card">

<h3>Produkty podle výrobce</h3>

<div class="chart-box">
<canvas id="bar"></canvas>
</div>

</div>


<div class="card">

<h3>Historie podle výrobce</h3>

<select id="man"></select>

<div class="chart-box">
<canvas id="line"></canvas>
</div>

</div>


<script>

const labels = {{ labels | safe }};
const values = {{ values | safe }};

document.addEventListener("DOMContentLoaded", function(){

const bar = document.getElementById("bar");

if(bar){

new Chart(bar,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:"Produkty",
data:values,
backgroundColor:"#2563eb"
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}

async function loadMan(){

const r = await fetch('/api/manufacturers');
const data = await r.json();

const s = document.getElementById('man');

data.forEach(m=>{

const o=document.createElement('option');
o.value=m;
o.textContent=m;

s.appendChild(o);

});

if(data.length) loadGraph(data[0]);

}

async function loadGraph(m){

const r = await fetch('/api/history/'+m);
const j = await r.json();

let labels=[];
let datasets=[];

Object.keys(j).forEach((k)=>{

if(labels.length===0) labels=j[k].t;

datasets.push({
label:k,
data:j[k].v,
fill:false,
borderColor:"#2563eb",
tension:0.2
});

});

if(window.l) window.l.destroy();

const ctx=document.getElementById("line");

if(!ctx) return;

window.l=new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:datasets
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}

document.getElementById("man").addEventListener("change", e=>{
loadGraph(e.target.value);
});

loadMan();

});

</script>

{% endblock %}
