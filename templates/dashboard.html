<script>

const labels = {{ labels | safe }};
const values = {{ values | safe }};

document.addEventListener("DOMContentLoaded", function(){

/* BAR GRAF */

const bar = document.getElementById("bar");

if(bar){

new Chart(bar,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:"Produkty",
data:values,
backgroundColor:"#2563eb"
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}


/* LOAD MANUFACTURERS */

async function loadMan(){

const r = await fetch('/api/manufacturers');
const data = await r.json();

let s = document.getElementById('man');

data.forEach(m=>{

let o=document.createElement('option');
o.value=m;
o.textContent=m;

s.appendChild(o);

});

if(data.length) loadGraph(data[0]);

}


/* LINE GRAF */

async function loadGraph(m){

const r = await fetch('/api/history/'+m);
const j = await r.json();

let labels=[];
let datasets=[];

Object.keys(j).forEach((k)=>{

if(labels.length===0) labels=j[k].t;

datasets.push({
label:k,
data:j[k].v,
fill:false,
borderColor:"#2563eb",
tension:0.2
});

});

if(window.l) window.l.destroy();

const ctx=document.getElementById("line");

if(!ctx) return;

window.l=new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:datasets
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}


/* CHANGE MANUFACTURER */

document.getElementById("man").addEventListener("change", e=>{
loadGraph(e.target.value);
});


loadMan();

});

</script>
