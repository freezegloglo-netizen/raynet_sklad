{% extends "base.html" %}

{% block content %}

<h1>🚗 Auta techniků</h1>

<div class="manufacturer-grid">

{% for car in cars %}

<div class="card">

<h3>{{ car.user }}</h3>

<table class="modern-table">

<thead>
<tr>
<th>Kód</th>
<th>Název</th>
<th>Množství</th>
<th>Akce</th>
</tr>
</thead>

<tbody>

{% for p in car.items %}

<tr>

<td>{{ p.code }}</td>
<td>{{ p.name }}</td>
<td>{{ p.quantity }}</td>

<td>

<form method="post" action="/use_from_car">

<input type="hidden" name="code" value="{{ p.code }}">

<button class="btn-small">Použito</button>

</form>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endfor %}

</div>

{% endblock %}
