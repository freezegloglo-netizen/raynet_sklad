<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>{{ title }}</title>

<link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">

        <div class="logo">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <span class="logo-text">STOCK SYSTEM</span>
        </div>

        <nav class="sidebar-links">

            <a href="/">Dashboard</a>
            <a href="/all">Sklad</a>
            <a href="/low">Nízký stav</a>
            <a href="/cars">Auta</a>
            <a href="/history">Historie</a>

            {% if mode == "ŘIDIČ" %}
            <a href="/car">Moje auto</a>
            {% endif %}

        </nav>

    </aside>


    <!-- MAIN -->
    <div class="main">

        <header class="topbar">

            <div>
                👤 <b>{{ user }}</b>
            </div>

            <div>
                Režim: <b>{{ mode }}</b>
            </div>

            <div>
                <a href="/logout">
                    <button class="logout-btn">Odhlásit</button>
                </a>
            </div>

        </header>


        <section class="content">

            {% block content %}{% endblock %}

        </section>

    </div>

</div>


<script>

function toggleMenu(){

    const sidebar = document.getElementById("sidebar")

    sidebar.classList.toggle("open")

    // přepočítání layoutu kvůli grafům
    setTimeout(function(){
        window.dispatchEvent(new Event("resize"))
    },300)

}

</script>
</body>
</html>
