<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ title }} | Stock System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
📦 STOCK SYSTEM
</div>

<nav>

<a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
📊 Dashboard
</a>

<a href="/all_new" class="{% if request.url.path.startswith('/all') %}active{% endif %}">
📦 Sklad
</a>

<a href="/low" class="{% if request.url.path == '/low' %}active{% endif %}">
⚠ Nízký stav
</a>

<a href="/cars" class="{% if request.url.path == '/cars' %}active{% endif %}">
🚗 Auta
</a>

<a href="/history" class="{% if request.url.path == '/history' %}active{% endif %}">
📜 Historie
</a>

</nav>

<div class="sidebar-footer">

<a href="/logout">
🚪 Odhlásit
</a>

</div>

</aside>


<!-- MAIN -->

<div class="main">

<header class="topbar">

<div>
👤 Uživatel: <strong>{{ user }}</strong>
</div>

<div>
⚙ Režim: <strong>{{ mode }}</strong>
</div>

</header>


<section class="content">

{% block content %}{% endblock %}

</section>

</div>

</div>

</body>

</html>
